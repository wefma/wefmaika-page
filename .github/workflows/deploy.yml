name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # pnpm install
      - run: pnpm install --frozen-lockfile --ignore-scripts

      # rebuild trusted native bindings without network
      - run: |
          uid="$(id -u)"
          gid="$(id -g)"
          home="$HOME"
          path="$PATH"
          xdg_cache_home="${XDG_CACHE_HOME:-$HOME/.cache}"
          corepack_home="${COREPACK_HOME:-$HOME/.cache/node/corepack}"
          node_dir="$(dirname "$(dirname "$(command -v node)")")"
          test -d "$node_dir/include/node"
          sudo unshare --net --setuid "$uid" --setgid "$gid" -- \
            env \
              HOME="$home" \
              PATH="$path" \
              XDG_CACHE_HOME="$xdg_cache_home" \
              COREPACK_HOME="$corepack_home" \
              npm_config_build_from_source=true \
              npm_config_nodedir="$node_dir" \
            sh -eu -c "
              test \"\$(id -u)\" -ne 0
              node -v
              pnpm --config.ignore-scripts=false rebuild better-sqlite3
            "

      # nuxt build
      - run: |
          uid="$(id -u)"
          gid="$(id -g)"
          home="$HOME"
          path="$PATH"
          xdg_cache_home="${XDG_CACHE_HOME:-$HOME/.cache}"
          corepack_home="${COREPACK_HOME:-$HOME/.cache/node/corepack}"
          sudo unshare --net --setuid "$uid" --setgid "$gid" -- \
            env HOME="$home" PATH="$path" XDG_CACHE_HOME="$xdg_cache_home" COREPACK_HOME="$corepack_home" \
            sh -eu -c "
              test \"\$(id -u)\" -ne 0
              node -v
              pnpm exec nuxt prepare
              pnpm exec nuxt build --preset github_pages
            "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4