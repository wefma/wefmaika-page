name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # pnpm install
      - run: pnpm install --frozen-lockfile --ignore-scripts

      # rebuild trusted native bindings without network
      - run: |
          uid="$(id -u)"
          gid="$(id -g)"
          sudo unshare --net --setuid "$uid" --setgid "$gid" -- sh -eu -c "
            test \"\$(id -u)\" -ne 0
            pnpm --config.ignore-scripts=false rebuild better-sqlite3 sharp
          "

      # nuxt build
      - run: |
          uid="$(id -u)"
          gid="$(id -g)"
          sudo unshare --net --setuid "$uid" --setgid "$gid" -- sh -eu -c "
            test \"\$(id -u)\" -ne 0
            pnpm exec nuxt prepare
            pnpm exec nuxt build --preset github_pages
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.output/public

  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4